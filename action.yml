name: Detect AI-generated pull requests
description: Detect AI-generated PRs from commit metadata using only the GitHub API.

inputs:
  label:
    description: Label to add to the pull request when AI is detected. Leave empty to skip labeling.
    required: false
    default: ""
  github-token:
    description: GitHub token used to read PR commits and optionally add a label.
    required: false
    default: ${{ github.token }}

outputs:
  ai-detected:
    description: Whether AI-generated commit metadata was detected.

runs:
  using: node24
  main: dist/index.js
